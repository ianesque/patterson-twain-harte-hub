<!doctype html>
<html lang="en">
    <head>
        <!-- build: dev -->
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <meta charset="UTF-8" />
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
        <meta name="description" content="Patterson Family Reunion trip hub — Twain Harte, CA" />
        <meta name="color-scheme" content="light dark" />
        <meta name="theme-color" content="#eef2ef" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="#0d1210" media="(prefers-color-scheme: dark)" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />

        <title>Patterson Trip Hub · Twain Harte</title>
    </head>

    <body class="size-full bg-primary antialiased">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
        <script>
            (function () {
                var key = "ui-theme";
                var saved = localStorage.getItem(key);
                var dark =
                    saved === "dark" ||
                    (saved !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
                document.documentElement.classList.toggle("dark-mode", dark);
            })();
        </script>
    </body>
</html>
